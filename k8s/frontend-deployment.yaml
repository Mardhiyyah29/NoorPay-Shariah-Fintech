apiVersion: apps/v1
kind: Deployment
metadata:
  name: noorpay-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: noorpay-frontend
  template:
    metadata:
      labels:
        app: noorpay-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/noorpay-frontend:latest
          ports:
            - containerPort: 80
