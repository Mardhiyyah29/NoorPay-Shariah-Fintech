apiVersion: apps/v1
kind: Deployment
metadata:
  name: noorpay-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: noorpay-backend
  template:
    metadata:
      labels:
        app: noorpay-backend
    spec:
      containers:
        - name: backend
          image: your-registry/noorpay-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: SECRET_KEY
              value: "REPLACE_ME"
